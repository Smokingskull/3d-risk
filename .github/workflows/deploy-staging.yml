name: Deploy (staging)

# Staging deploy tracking main. Builds the client and syncs it to
# /srv/3drisk-staging on the VPS, served at staging.3drisk.iainwilson.uk
# (see deploy/3drisk-staging.Caddyfile). This deploys the same content as
# production (/srv/3drisk, main) to a separate staging site.
on:
  push:
    branches: [feature/multiplayer-spike]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: 3drisk-staging-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r --if-present test
      - run: pnpm --filter @risk3d/client build
        env:
          VITE_MP_SERVER: wss://mp.3drisk.iainwilson.uk

      - name: Ensure staging directory exists on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: sudo mkdir -p /srv/3drisk-staging && sudo chown "$USER":"$USER" /srv/3drisk-staging

      - name: Sync build to the VPS staging directory
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: apps/client/dist/
          remote_path: /srv/3drisk-staging/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
