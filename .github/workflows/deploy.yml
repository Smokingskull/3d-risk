name: Deploy

# On push to main: typecheck + test, build the static client, then sync it to the
# VPS over SSH. Caddy serves /srv/3drisk as 3drisk.iainwilson.uk (see deploy/).
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: 3drisk-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r --if-present test
      - run: pnpm --filter @risk3d/client build

      - name: Ensure target directory exists on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: sudo mkdir -p /srv/3drisk && sudo chown "$USER":"$USER" /srv/3drisk

      - name: Sync build to the VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: apps/client/dist/
          remote_path: /srv/3drisk/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
